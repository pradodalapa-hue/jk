<!DOCTYPE html><html><head><meta charset="UTF-8"><title>SISTEMA JDP</title></head>
<body style="background:#020305;margin:0;display:flex;align-items:center;justify-content:center;height:100vh;color:gold;font-family:sans-serif;">
<div id="status"><h2>CONECTANDO AO NÚCLEO...</h2></div>
<script>
    const d = window.location.hostname;
    const o = "pradodalapa-hue.github.io";
    // SÓ LIBERA SE ESTIVER NO SEU DOMÍNIO OFICIAL
    if(d === o || d === "localhost"){
        fetch('nucleo/kernel.dat').then(r => r.text()).then(b => {
            document.open();
            document.write(atob(b));
            document.close();
        }).catch(() => {
            document.getElementById('status').innerHTML = "<h2 style='color:red;'>ERRO DE SINCRONIA</h2>";
        });
    } else {
        document.body.innerHTML = "<h1 style='color:red;'>ACESSO NEGADO: CÓPIA NÃO AUTORIZADA</h1>";
    }
</script></body></html>
